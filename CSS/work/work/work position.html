<html>
	<head>
		<title>position</title>
		<style>
			.box1
			{
				height:300px;
				width:300px;
				background-color:red;
				position:fixed;
				top:100px;
				left:100px;
				border-style:outset;
				border-color:red;
			}
			.box2
			{
				height:200px;
				width:200px;
				background-color:green;
				position:relative;
				top:50px;
				left:50px;
			}
			.box3
			{
				height:100px;
				width:100px;
				background-color:blue;
				position:relative;
				top:50px;
				left:50px;
			}
			.box4
			{
				height:50px;
				width:50px;
				background-color:yellow;
				position:relative;
				top:25px;
				left:25px;
			}
		</style>
	</head>
		<body bgcolor="black">
		<div class="box"></div>
			<div class="box1">
				<div class="box2">
					<div class="box3">
						<div class="box4">
							<a href="1.png" class="text" target="_blank"><font color="white"></font>click</a></div>
					</div>
				</div>
			</div>
		
		
		
		</body>




</html>
