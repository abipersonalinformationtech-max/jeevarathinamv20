<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for_loop</title>
</head>
<body>
    <script>
        /*for(i=1;i<=10;i++){
            console.log(i);
        }*/

        let start = Number(prompt("Enter the Start value : "));
        let end = Number(prompt("Enter End Value : "));
        let table = Number(prompt("Enter the table : "));

        for(start=1;start <= end;start++){
            console.log(table + "*" + start + "=" + (table * start));
        }
    </script>
</body>
</html>
