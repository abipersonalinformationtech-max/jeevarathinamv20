<html>	
	<head>
		<title>frameset</title>
	</head>
	<frameset rows="25%,25%,*">
		<frameset cols="25%,25%,*">
			<frame src="red.html" height="100px" width="100px"></frame>
			<frame src="blue.html" height="100px" width="100px"></frame>
			<frame src="green.html" height="100px" width="100px"></frame>
		</frameset>
		<frameset cols="30%,30%,*">
			<frame src="red.html" height="100px" width="100px"></frame>
			<frame src="blue.html" height="100px" width="100px"></frame>
			<frame src="green.html" height="100px" width="100px"></frame>
		</frameset>
	</frameset>
</html>
