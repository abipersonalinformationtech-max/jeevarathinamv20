<html>
	<head>
		<title>Table tag</title>
	</head>
	<body>
		<!--
			border - to create table border
			cellspacing - display space between each cell
			cellpadding - apply space in the cell	
			rowspan - join rows	
			colspan - join coloum	
		-->
		<table border='2' cellspacing='8' cellpadding='8'>
			<thead>
				<tr>
					<th>Sno</th>
					<th>Name</th>
					<th>Mobile</th>
					<th>City</th>
				</tr>
			</thead>
			<tbody>
				<tr>
					<td>1</td>
					<td rowspan='2'>Ram</td>
					<td colspan='2'>Salem</td>
				</tr>
				<tr>
					<td>2</td>
					<td>9632015478</td>
					<td>Chennai</td>
				</tr>
				<tr>
					<td>3</td>
					<td>Sara</td>
					<td>6541203789</td>
					<td>Coimbatore</td>
				</tr>
			</tbody>
		</table>
	</body>
</html>
