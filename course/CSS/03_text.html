<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #font{
            font-size: 2rem; /* px,cm,mm,rem */
            font-family: algerian;
            font-weight: bold;  /* 100 to 900, bold */
            font-variant: small-caps; /* normal, small-caps */
            font-style: italic;
        }
        #para{
            text-align: justify;
            color:crimson;
            text-indent: 100px;
            word-spacing: 10px;
            letter-spacing: 5px;
            line-height: 40px;
            text-transform:capitalize ; /*uppercase | lowercase */
            text-shadow: 2px 2px #616161; /*left top color */
            text-decoration: underline; /*overline | line-through |  none */
        }

        
    </style>
</head>
<body>
    <a href="" style="text-decoration: none;">Login</a>
    <p id="para">Lorem ipsum dolor sit amet consectetur adipisicing elit. Laudantium ducimus culpa voluptatum reprehenderit assumenda ea ut deserunt atque, eligendi sequi. Quam veritatis quas exercitationem est saepe error distinctio ut ducimus.</p>
</body>
</html>
