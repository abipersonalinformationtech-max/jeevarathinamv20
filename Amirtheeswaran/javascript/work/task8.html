<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task -8</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <table class="table table-bordered table-striped">
                    <thead>
                        <tr>
                            <th>S.NO</th>
                            <th>Product</th>
                            <th>MRP</th>
                            <th>Price</th>
                            <th>Qty</th>
                            <th>Total</th>
                            <th>REMOVE</th>
                        </tr>
                    </thead>
                    <tbody id="tbl_body">
                        <tr>
                            <td class="sno">1</td>
                            <td><input type="text" class="form-control product"></td>
                            <td><input type="number" class="form-control mrp"></td>
                            <td><input type="number" class="form-control price"></td>
                            <td><input type="number" class="form-control qty" onkeyup="row_total(this)"></td>
                            <td><input type="number" class="form-control total"></td>
                            <td><input type="button" class="btn btn-danger" value="Remove" onclick="remove_row(this)">
                            </td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr>
                            <td>
                                <input type="button" class="btn btn-success" id="add-btn" value="Add Row" onclick="add_row()">
                            </td>
                            <td colspan="4"></td>
                            <td><input type="text" class="form-control" id="net_amt"></td>
                            <td></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>
        
    <script>
        function add_row() {
            let sno = document.querySelectorAll(".sno").length;
            sno++;
            let tr = document.createElement("tr");
            tr.innerHTML ="<td class='sno'>"+sno+"</td> <td><input type='text' class='form-control product'></td> <td><input type='number' class='form-control mrp'></td> <td><input type='number' class='form-control price'></td> <td><input type='number' class='form-control qty' onkeyup='row_total(this)'></td> <td><input type='number' class='form-control total'></td> <td><input type='button' class='btn btn-danger' value='Remove' onclick='remove_row(this)'> </td>"
            document.getElementById("tbl_body").append(tr);
        }

        function row_total(ele){
           let current_row = ele.parentElement.parentElement;
           let qty = current_row.querySelector(".qty").value;
           let price = current_row.querySelector(".price").value;
           let tot = Number(price) * Number(qty);
           current_row.querySelector(".total").value= tot;
           net_amt();
        }

        function net_amt(){
            let sum = 0;
            let totals = document.querySelectorAll(".total");
            for(i=0;i<totals.length;i++){
                sum = sum + Number(totals[i].value);
            }
            document.querySelector("#net_amt").value = sum;
        }

        function remove_row(e){
            let n = document.querySelector("#tbl_body").querySelectorAll("tr").length;
            if(n>1&&confirm("Are you ok to delete")==true){
                let ele = e.parentNode.parentNode;
                ele.remove();
                serial_no();

            }
        }

        function serial_no(){
            let sno = document.querySelectorAll(".sno");
            for(let i=0;i<sno.length;i++){
                sno[i].innerHTML = i+1;
            }
        }
    </script>
</body>

</html>
