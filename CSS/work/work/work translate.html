<html>
	<head>
		<title>translate</title>
		<style>
			body{
				background:skyblue;
				display:flex;
				justify-content:center;
				align-items:center;
				
			}
			#box{
				height:200px;
				width:200px;
				background:red;
				border-radius:5px;
				text-align:center;
				color:white;
			}
			#box:hover{
				transform:translate(100px,100px);
				cursor:pointer;
			}
			#box:hover{
				background:blue;
			}
			
		</style>
	</head>
	<body>
		<div id="box">
			WELCOME
		</div>
	</body>
</html>
