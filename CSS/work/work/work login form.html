<html>
	<head>
		<title>login form</title>
		<style>
			.heading{
				height:210px;
				width:250px;
				background-color:white;
				position:absolute;
				text-align:center;
				border-radius:5px;
				left:400px;
				top:150px;
				font-family:Calibri;
			}
			body{
				background-color:skyblue;
				position:relative;
			}	
			label{
				margin-right:162px;
			}
			.mail{
				margin-right:184px;
			}
			input{
				padding:1px 0px;
				width:90%;
				border:none;
				border-radius:3px;
				border:1px solid gray;
				margin-bottom:4px;
			}
			button{
				margin-top:10px;
				background:lightgreen;
				width:90%;
				color:white;
				border:none;
				border-radius:5px;
				padding:4px 0px;
			}
			h3{
				font-size:25px;
				font-family:Cambria ;
			}
			p{
				font-size:12px;
				color:white;
			}
			
		</style>
	</head>
	<body>
	<div class="heading">
		<form>
			<h3>Login</h3>
			<div class="login form">
				<label class="mail">Email</label><br>
				<input type='email' required>
			</div>
			<div>
				<label>Password</label><br>
				<input type='Password' required>
			</div>
			<div>
				<button>submit</button>
			</div>
		</form>
		<p>Not have an account?<a class="the end" href="work reg form.html">Sign Up Here</a></p>
	</div>
	</body>
</html>
