<html>
	<head>
		<title>Transform Property</title>
		<style>
			div{
				height:200px;
				width:500px;
				background:green;
				color:white;
				margin-top:160px;
				transform:scaley(4.5);
				transform:scalex(4.5);
				transform:skewx(60deg);
				transform:skewy(60deg);
				transform:rotate(60deg);
				
			}
		
		</style>
	</head>
	<body>
		<div>Hello
		</div>
	</body>
</html>
