{% extends '_layout.html' %}
{% block body %} 
	<div class='container'>
		<div class='row'>
			<div class='col-md-6 mx-auto mt-1'>
				<div class='card' style='background-color:#cffffd; box-shadow: rgba(50, 50, 93, 0.25) 0px 30px 60px -12px inset, rgba(0, 0, 0, 0.3) 0px 18px 36px -18px inset;'>
				<h3 class='text-center text-danger'><i class="fa fa-user-secret" aria-hidden="true"></i> Admin Login</h3>
				<form style='padding:10%;'>
					<div class='form-group'>
					<label class='mt-2'>Username:</label>
					<input type='text' class='form-control'>
					</div>
					<div class='form-group'>
					<label>Password:</label>
					<input type='password' class='form-control'>
					</div>
					<div class='form-group'>
					<input type='button' class='btn btn-success btn-lg mt-5' value='Login' style='margin-left:140px; padding-left:25px;padding-right:25px;margin-bottom:0px;'>
					</div>
				</form>
				</div>
			</div>
		</div>
	</div>

{% endblock %}
