<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" ></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"></script>
    <title>Document</title>
</head>
<body>
    {% include 'navbar.html' %}
    <div class="container">
        <div class="row">
            <div class="col-md-8">
                <table class="table table-bordered table-striped table-hover mt-5">
                    <thead>
                        <tr>
                            <th>Sno</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Mobile</th>
                            <th>Password</th>
                            <th>Edit</th>
                            <th>Delete</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for row in records %}
                            <tr>
                                <td>{{ loop.index }}</td>
                                <td>{{ row.uname }}</td>
                                <td>{{ row.uemail }}</td>
                                <td>{{ row.umobile }}</td>
                                <td>{{ row.upassword }}</td>
                                <td><a href="{{url_for('edit_user',uid=row.uid)}}" class="btn btn-info">Edit</a></td>
                                <td><a href="{{url_for('del_user',uid=row.uid)}}" class="btn btn-danger">Delete</a></td>
                            </tr>
                        {% endfor %}
                    </tbody>
                </table>                
            </div>
        </div>
    </div>
</body>
</html>
