<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-12">
                <table class="table table-bordered table-striped">
                    <thead>
                        <tr>
                            <th>Sno</th>
                            <th>Name</th>
                            <th>Mobile No</th>
                            <th>Age</th>
                            <th>Add</th>
                            <th>Remove</th>
                        </tr>
                    </thead>
                    <tbody id="tbl_body">
                        <tr>
                            <td class="sno">1</td>
                            <td><input type="text" class="form-control"></td>
                            <td><input type="text" class="form-control"></td>
                            <td><input type="text" class="form-control"></td>
                            <td><input type="button" class="btn btn-primary" value="Add" onclick="add_row()"></td>
                            <td><input type="button" class="btn btn-danger" value="Remove" onclick="remove_row(this)">
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function add_row() {
            let sno = document.querySelectorAll(".sno").length;
            sno++;
            let tr = document.createElement("tr");
            tr.innerHTML = "<td class='sno'>"+ sno + "</td> <td><input type='text' class='form-control'></td> <td><input type='text' class='form-control'></td> <td><input type='text' class='form-control'></td> <td><input type='button' class='btn btn-primary' value='Add' onclick='add_row()'></td> <td><input type='button' class='btn btn-danger' value='Remove' onclick='remove_row(this)'></td>";
            document.getElementById("tbl_body").append(tr);
        }


        function remove_row(e){
            let n = document.querySelector("#tbl_body").querySelectorAll("tr").length;
            if(n>1&&confirm("are u sure")==true){
                let ele = e.parentNode.parentNode;
                ele.remove();
                serial_no();

            }
        }

        function serial_no(){
            let cls = document.querySelectorAll(".sno");
            for(let i=0;i<cls.length;i++){
                cls[i].innerHTML = i+1;
            }
        }
    </script>
</body>

</html>
