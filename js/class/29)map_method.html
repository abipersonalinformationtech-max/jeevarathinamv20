<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <p id="output"></p>

    <script>
        let a = [1,2,3,4,5,6];

        function square(x){
            return Math.pow(x,2);
        }

        let b = a.map(square);

        document.querySelector("#output").innerHTML = b;

    </script>
</body>
</html>
