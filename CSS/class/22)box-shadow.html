<html>
	<head>
		<title>Box shadow</title>
		<style>
			#box{
				height:200px;
				width:200px;
				background:white;
				border-radius:5px;
				margin-left:500px;
				box-shadow:2px 3px 3px 2px #add; /* right bottom fourside light fourside dark */
			}
		</style>
	</head>
	<body>
		<div id='box'></div>
	</body>
</html>
