<html>
	<head>
		<title>animation</title>
		<style>
			body{
			background-color:lightgreen;
			}
			.box{
				height:200px;
				width:200px;
				background-color:red;
				border-radius:10px;
				position:absolute;
				animation-name:vijay;
				animation-duration:5s;
				}
				@keyframes vijay{
					from{ background-color:red;}
					to{ background-color:black;}
				}
			}
		</style>
	</head>
	<body>
		<p>WELCOME TO THE WORLD</p>
		<div class="box">
		</div>
	</body>
</html>
