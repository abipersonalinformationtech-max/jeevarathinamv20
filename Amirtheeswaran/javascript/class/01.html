<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>While_loop</title>
</head>
<body>
    <script>
        let start = Number(prompt("Enter the Start value : "));
        let end = Number(prompt("Enter End Value : "));
        let table = Number(prompt("Enter the table : "));
        while(start <= end){
            console.log(table + "*" + start + "=" + (table * start));
            start++;
        }
    </script>
</body>
</html>
