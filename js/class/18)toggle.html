<html>
	<head>
		<title>Toggle Class</title>
		<style>
			.menu{
				padding:10px;
				width:100px;
				border:1px solid grey;
				margin-top:10px;
			}
			a{
				display:block;
				margin-bottom:2px;
			}
			.hide{
				display:none;
			}
		</style>
	</head>
	<body>
		<input type='button' value='Menu' onclick='toggleMenu()'>
		<div class='menu hide'>
			<a href=''>Home</a><br>
			<a href=''>Shop</a><br>
			<a href=''>About Us</a><br>
			<a href=''>Contact Us</a>
		</div>
		<script>
			function toggleMenu(){
				document.querySelector(".menu").classList.toggle("hide");
			}
		</script>
	</body>
</html>
