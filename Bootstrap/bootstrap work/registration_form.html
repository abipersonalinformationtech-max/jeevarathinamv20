<html>
	<head>
		<title>registration form </title>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
		<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
		<style>
			body{
				margin:0;
				padding:0;
				background-image:url(beard.jpg);
				background-repeat:no-repeat;
				background-size:cover;
			}
			h3{
				background:black;
				opacity: 0.5;
			}
			.container{
				padding-right: 0px; 
				padding-left: 0px;
			}
			.row{
				padding:15px;
			}
			img{
				opacity: 0.5;
			}
			img:hover{
				opacity: 1.0;
			}
		</style>
	</head>
	<body>
		<div class="container bg-light mt-5">
			<h3><p class='text-center w-100'>STUDENT REGISTRATION FORM</p></h3>
			<div class="row">
				<div class="col-md-6">
					<div class="left-content">
						<form>
							<div class="mt-4">
								<label>FIRST NAME:</label>
								<input type='text' class='form-control'>
							</div>
							<div>
								<label>LAST NAME:</label>
								<input type='text' class='form-control'>
							</div>
							<div>
								<label>EMAIL:</label>
								<input type='email' class='form-control'>
							</div>
							<div>
								<label>PHONE:</label>
								<input type='text' class='form-control'>
							</div>
							<div class='row'>
								<div class='col-md-6'>
									<div>
										<label>PASSWORD:</label>
										<input type='password' class='form-control'>
										<span class='text-danger'>Minimum of 6 Characters</span>
									</div>
								</div>
								<div class='col-md-6'>
									<div>
										<label></label>
										<input type='password' class='form-control mt-4'>
									</div>
								</div>
							</div>
							<div class='mt-3'>
								<label class='pr-2'>Gender</label>
								<input type='radio' name='gender'>Male  &nbsp;&nbsp;
								<input type='radio' name='gender'>Female
							</div>
							<div>
								<input type='submit' value='SUBMIT' class='w-100 btn btn-danger'>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
