<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <div class="container">
            <div class="row">
                <div class="col-md-10">
                    <p id="output"></p>
                </div>
            </div>
        </div>
        <script>
            var a = [
                ["Apple",150,"KG","team2.jpg"],
                ["Orange",180,"KG","team2.jpg"],
                ["Mango",130,"KG","team2.jpg"],
                ["Watermelon",10,"PCE","team2.jpg"],
            ];

            var table = "<table class='table table-bordered mt-4'><thead><tr><th>Name</th><th>Price</th><th>Uom</th><th>Image</th></tr></thead>";

            a.forEach(function(v,i){
                table += "<tr><td>"+v[0]+"</td><td>"+v[1]+"</td><td>"+v[2]+"</td><td><img src="+v[3]+" style='width:70px;'></td></tr>";
            });

            table += "</table>";

            document.querySelector("#output").innerHTML=table;
        </script>
    </body>
</html>
