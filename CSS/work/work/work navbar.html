<html>
	<head>
		<title>navbar</title>
		<meta name="viewport"content="width=device-width,initial-scale=1.0">
			<style>
				html,body
				{
					margin:0;
					padding:0;
				}
				@media (min-width:600px)
				{
					.parent
					{
						background:blue;
						padding:10px;
					}
					ul{
						display:flex;
						justify-content:space-around;
					}
					li{
						list-style-type:none;
						display:inline;
					}
					.child{
						color:white;
						padding-right:10px;
						text-decoration:none;
					}
					.child:hover{
						color:red;
						cursor:pointer;
					}
				}
				@media (max-width:600px)
				{
					.parent{
						background:green;
					}
					ul{
						padding:0;
					}
					li{
						list-style-type:none;
						border-bottom:2px solid red;
					}			
					.child{
						color:white;
						text-decoration:none;
					}	
				}
			</style>
	</head>
	<body>
		<div class="parent">
			<ul>
				<li><a class="child" href="">Home</a></li>
				<li><a class="child" href="">Shop</a></li>
				<li><a class="child" href="">Contact Us</a></li>
				<li><a class="child" href="">About Us</a></li>
			</ul>
		</div>
	</body>
</html>
