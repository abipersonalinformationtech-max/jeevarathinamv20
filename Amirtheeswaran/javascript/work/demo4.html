<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>While_loop(❁´◡`❁)</title>
</head>
<body>

        


    <script>
        
        let start = Number(prompt("Enter The Starting Value:  "));
        let end   = Number(prompt("Enter The Ending Value:  "));
        let table = Number(prompt("Enter The Table:  "));

        for(start=1; start<=end; start++){
        console.log(start + "*" + table + "=" + (table*start));
        
    }
        
    </script>
</body>
</html>
