<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toggle Menu</title>
    <style>
      .menu{
        padding:10px;
        width:100px;
        border:1px solid #ccc;
        margin-top:10px;
      }
      .menu a{
        display:block;
        margin-bottom:10px;
      }  
      .hide{
        display:none;
      }
    </style>
</head>
<body>
    <input type="button" value="Menu" onclick="toggle_menu()">
    <div class="menu hide">
      <a href="">Home</a>
      <a href="">Shop</a>
      <a href="">Contact Us</a>
      <a href="">About Us</a>
    </div>
    <script>
      function toggle_menu(){
        document.querySelector(".menu").classList.toggle("hide");
      }
    </script>
</body>
</html>
