<html>
    <head>
        <title>work_billing</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <div class="container">
            <div class="row">
                <div class="col-md-8">
                    <table class="mt-5 table-bordered p-5">
                        <tr>
                            <th class="text-center">S.No</th>
                            <th class="text-center">Select</th>
                            <th class="text-center">Item</th>
                            <th class="text-center">Price</th>
                            <th class="text-center">Qty</th>
                            <th class="text-center">Total</th>
                        </tr>
                        <tr>
                            <td class="text-center">1</td>
                            <td class="text-center"><input type="Checkbox" onchange="changeStatus(this,1)"></td>
                            <td class="text-center">Sweetcorn</td>
                            <td class="text-center" id="price1">20</td>
                            <td class="text-center"><input type="number" disabled id="qty1" onkeyup="calculateTotal(1)"></td>
                            <td class="text-center" id="total1" >0</td>  
                        </tr>
                        <tr>
                            <td class="text-center">2</td>
                            <td class="text-center"><input type="Checkbox" onchange="changeStatus(this,2)"></td>
                            <td class="text-center">Butter Sweetcorn</td>
                            <td class="text-center" id="price2">30</td>
                            <td class="text-center"><input type="number" disabled id="qty2" onkeyup="calculateTotal(2)"></td>
                            <td class="text-center" id="total2">0</td>
                        </tr>
                        <tr>
                            <td class="text-center">3</td>
                            <td class="text-center"><input type="Checkbox" onchange="changeStatus(this,3)"></td>
                            <td class="text-center">Masala Sweetcorn</td>
                            <td class="text-center" id="price3">40</td>
                            <td class="text-center"><input type="number" disabled id="qty3" onkeyup="calculateTotal(3)"></td>
                            <td class="text-center" id="total3">0</td>
                        </tr>
                        <tr>
                            <td class="text-center">4</td>
                            <td class="text-center"><input type="Checkbox" onchange="changeStatus(this,4)"></td>
                            <td class="text-center">Periperi Sweetcorn</td>
                            <td class="text-center" id="price4">20</td>
                            <td class="text-center"><input type="number" disabled id="qty4" onkeyup="calculateTotal(4)"></td>
                            <td class="text-center" id="total4">0</td>
                        </tr>
                        <tr>
                            <td class="text-center">5</td>
                            <td class="text-center"><input type="Checkbox" onchange="changeStatus(this,5)"></td>
                            <td class="text-center">Special Sweetcorn</td>
                            <td class="text-center" id="price5">20</td>
                            <td class="text-center"><input type="number" disabled id="qty5" onkeyup="calculateTotal(5)"></td>
                            <td class="text-center" id="total5">0</td>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td class="text-center">Total</td>
                            <td class="text-center" id="output"></td>
                        </tr>
                     </table>
                 </div>  
            </div>
        </div>
        <script>
            function changeStatus(ele,num){
                const qty = document.querySelector("#qty"+num);
                const total = document.querySelector("#total"+num);
                if(ele.checked){
                    qty.disabled = false;
                }else{
                    qty.disabled = true;
                    qty.value = "";
                    total.innerText = "";
                    overallTotal();
                }
            }

            function calculateTotal(num){
                const price = document.querySelector("#price"+num).innerText;
                const qty = document.querySelector("#qty"+num).value;
                const total = document.querySelector("#total"+num);
                const result = Number(price)* Number(qty)
                total.innerText = result;
                overallTotal();
            }

            function overallTotal(){
                let sum = 0;
                for(let i=1;i<=5;i++){
                   const total = document.querySelector("#total"+i).innerText;
                   sum += Number(total);
                }
                document.querySelector("#output").innerText = sum;
            }
        </script>
    </body>
</html>
