<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-10">
                <table class="table table-bordered table-striped">
                    <thead>
                        <tr>
                            <th>Sno</th>
                            <th>Product</th>
                            <th>Rate</th>
                            <th>Qty</th>
                            <th>Total</th>
                            <th>Add</th>
                            <th>Remove</th>
                        </tr>
                    </thead>
                    <tbody id="tbody">
                        <tr>
                            <td class="sno">1</td>
                            <td><input type="text" class="form-control"></td>
                            <td><input type="text" class="form-control rate"></td>
                            <td><input type="text" class="form-control qty" onkeyup="calculateTotal(this)"></td>
                            <td><input type="text" class="form-control total"></td>
                            <td><input type="button" class="btn btn-success" onclick="add_row()" value="Add"></td>
                            <td><input type="button" class="btn btn-danger" onclick="remove_row(this)" value="Remove"></td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td>Overall Total is :</td>
                            <td><input type="text" class="form-control" id="overalltotal"></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div> 
    <script>
        function add_row(){
            var sno = document.querySelectorAll('.sno').length;
            sno++;
            var tr = document.createElement("tr");
            tr.innerHTML = '<td class="sno">'+sno+'</td> <td><input type="text" class="form-control"></td> <td><input type="text" class="form-control rate"></td> <td><input type="text" class="form-control qty" onkeyup="calculateTotal(this)"></td> <td><input type="text" class="form-control total"></td> <td><input type="button" class="btn btn-success" onclick="add_row()" value="Add"></td> <td><input type="button" class="btn btn-danger" onclick="remove_row(this)" value="Remove"></td>'
            document.querySelector("#tbody").appendChild(tr);
        }
        function remove_row(e){
            var n = document.querySelector("#tbody").querySelectorAll("tr").length;
            if(n>1 && confirm("Are you sure remove ?")){
                var ele = e.parentNode.parentNode;
                ele.remove();
                serial_no();
                overallTotal();
            }
        }
        function serial_no(){
            var cls = document.querySelectorAll(".sno");
            for(var i=0; i<cls.length;i++){
                cls[i].innerHTML=i+1;
            }
             overallTotal();
        }
        function calculateTotal(ele){
            var currentRow = ele.parentElement.parentElement;
            var rate = currentRow.querySelector(".rate");
            var qty = currentRow.querySelector(".qty");
            var total = currentRow.querySelector(".total");

            var r = Number(rate.value);
            var q = Number(qty.value);
            var t = r * q;

            total.value = t;
            overallTotal();
        }
        function overallTotal(){
            var sum = 0;
            var totals = document.getElementsByClassName("total");
            var tot = totals.length;
            for(i=0;i<tot;i++){
                sum = sum + Number(totals[i].value);
            }
            document.querySelector("#overalltotal").value = sum;
        }

    </script>
</body>
</html>
