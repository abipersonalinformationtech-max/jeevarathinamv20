<html>
	<head>
		<title>list properties</title>
		<style>
			.list{
				list-style-type:upper-alpha;
				list-style-image:url();
			}
		
		</style>
	</head>
	<body>
		<ul class="list">
		<li>red</li>
		<li>green</li>
		<li>blue</li>
		<li>orange</li>
		</ul>
		<h3>inside list</h3>
		<ul class="cls1">
		<li>red</li>
		<li>green</li>
		<li>blue</li>
		<li>orange</li>
		</ul>
		<h3>outside list</h3>
		<ul class="cls2">
		<li>red</li>
		<li>green</li>
		<li>blue</li>
		<li>orange</li>
		</ul>
	</body>
</html>
