<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>map-method</title>
</head>
<body>
    <script>
        let a = [1, 2, 3, 4, 5];
        function square(x) {
            return Math.pow(x, 2)
        }

        let b = a.filter(square);
        console.log(b);

    </script>
</body>
</html>
