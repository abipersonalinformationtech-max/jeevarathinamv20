<html>
    <head>
        <title>Hide Show Password</title>
    </head>
    <body>
        <div>
            <input type="password" id="pwd" placeholder="Enter Your Password">
            <input type="button" id="btn" value="Click" onclick="hide_show_password()">
        </div>
        <script>
            function hide_show_password(){
                const pwd = document.querySelector("#pwd");
                const type = pwd.getAttribute("type");
                if(type == "password"){
                    pwd.setAttribute("type","text");
                }else{
                    pwd.setAttribute("type","password");
                }
            }
        </script>
    </body>
</html>
