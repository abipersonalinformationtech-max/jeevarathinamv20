<html>
	<head>
		<title>Before after</title>
		<style>
			p:before{
				content:"Hii";
				color:red;
			}
			p:after{
				content:"!...";
				color:green;
			}
			#box{
				height:200px;
				width:20 0px;
				background:red;
				/* offset-x,offset-y,blur-radius,spread-radius,color */
				box-shadow:2px 2px 30px 3px blue;
			}
			.hello{
				height:150px;
				width:150px;
				background:pink;
				box-shadow:5px 3px 3px 2px red;
			}
		</style>
	</head>
	<body>
		<p>Welcome Ram</p>
		
		<div id='box'>
		
		</div>
		<div class='hello'></div>
	</body>
</html>
