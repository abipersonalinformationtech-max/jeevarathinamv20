<html>
	<head>
		<title>Dropdown Menu</title>
		<style>
			.dropdown{
				display:inline-block;
				width:auto;
				position:relative;
			}
			.dropdown .btn{
				background:#1993f7;
				color:white;
				padding:10px 15px;
				border:none;
				border-radius:5px;
			}
			.dropdown .btn:hover{
				background:#48a8f7;
			}
			.dropdown .list{
				margin:0;
				width:100%;
				list-style-type:none;
				padding:12px 20px;
				box-shadow:2px 2px 3px 2px #ccc;
				border-radius:5px;
				display:none;
				position:absolute;
				position:relative;
				left:60px;
			}
			.dropdown li{
				padding:5px;
			}
			.dropdown li a{
				color:black;
				text-decoration:none;
			}
			.dropdown:hover .list{
				display:block;
				color:green;
			}
			
		</style>
	</head>
	<body>
		<div class='dropdown'>
			<input type='button' class='btn' value='Dropdown'>
			<ul class='list'>
				<li><a href=''>Home</a></li>
				<li><a href=''>Shop</a></li>
				<li><a href=''>Contact Us</a></li>
				<li><a href=''>About Us</a></li>
			</ul>
		</div>
	</body>
</html>
