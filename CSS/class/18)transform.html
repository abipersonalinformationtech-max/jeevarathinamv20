<!--
  transform
	skew X & Y,rotate (deg)
-->

<html>
	<head>
		<title>Transform</title>
		<style>
			.box{
				height:200px;
				width:200px;
				background:red;
				/*transform:rotate(0deg);*/
				transform:translate(270deg);
			}
		</style>
	</head>
	<body>
		<div class='box'>Welcome</div>
	</body>
</html>
