<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>
    <link rel="stylesheet" href="face.css">
</head>

<body>
    <div class="content">
        <div class="heading">Facebook</div>
        <div class="left-box">
            <div class="label">
                <form>
                    <div class="group">
                        <label>Email or phone</label>
                        <input type="text" class="btn">
                    </div>
                    <div class="group"> 
                        <label>Password</label>
                        <input type="password" class="btn">
                        <a href="#" class="link-text">Forgotten account?</a>
                    </div>
                    <div class="group">
                        <label>&nbsp;</label>
                        <input type="submit" value="login" class="btn1">
                    </div>

                </form>
            </div>
        </div>
        <div class="left-box">
            <div>
                <p class="text">Facebook helps you connect and share with the people in your life.</p>
                <img src="images/face.png" class="image">
            </div>
            <div class="Signin">
            <h2>Create an account</h2>
            <p>It's quick and easy.</p>
                <form>
                    <div>
                        <input type="text" placeholder="First name">
                        <input type="text" placeholder="Surname">
                        <input type="text" placeholder="Mobile no or Email Address">
                        <input type="password" placeholder="New Password">
                    </div>
                    <label>Birthday</label>
                    <div class="select">
                        <select>
                            <option>3</option>
                        </select>
                        <select>
                            <option>Jun</option>
                        </select>
                        <select>
                            <option>1995</option>
                        </select>
                    </div>
                    <label>Gender</label>
                    <div class="radio">
                        <label><input type="radio" name="Female">Female</label>
                        <label><input type="radio" name="Male">Male</label>
                        <label><input type="radio" name="Custom">Custom</label>
                    </div>
                    <p>By checking Sign up,you agree to our terms,data policy and Cookie Policy you many receive SMR can out any
                        time.</p>
                    <div class="Signup">
                        <input type="button" value="Sign Up">
                    </div>
                </form>
            </div>
    </div>
        
</body>

</html>
