<html>
	<head>
		<title>Array function</title>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
		<custom_style style='display:none;'>
			.table{
				width:100%;
				border-collapse:collapse;
			}
			.table td,.table th{
				border:1px solid #ccc;
				padding:8px;
			}
			.hide{
				display:none;
			}
			input{
				border:none;
			}
		</custom_style>
	</head>
	<body>
		<div class='container-fluid mt-5'>
			<div class='row'>
				<div class='col-6'>
					<input type='text' class='form-control mb-3' placeholder='Search...' onkeyup='filters(this)'>
					<div id='out' class='row'>
					
					</div>
				</div>
				<div class='col-6' id='printBox'>
					<table class='table'  >
						<thead class='table-dark'>
							<tr>
								<td>Product Name</td>
								<td>Qty</td>
								<td>Price</td>
								<td>Amount</td>
								<td class='hide'>Remove</td>
							</tr>
						</thead>
						<tbody class='tbody'>
						</tbody>
						<tfoot>
							<tr>
								<td></td>
								<td></td>
								<td>Total</td>
								<td id='tot'>0.00</td>
							</tr>
							<tr>
								<td></td>
								<td></td>
								<td>Gst</td>
								<td id='gst'>0.00</td>
							</tr>
							<tr>
								<td></td>
								<td></td>
								<td>Net Amount</td>
								<td id='net'>0.00</td>
							</tr>
							<tr class='hide'>
								<td colspan='4' class='text-right'><input type='button' value='Print Bill' class='btn btn-success' onclick='printPage()'></td>
							</tr>
						</tfoot>
					</table>
				</div>
			</div>
		</div>		
		<script>

			function rowTotalCalc(ele){
				var qty = Number(ele.value);
				var price = Number(ele.parentElement.parentElement.querySelector(".rprice").innerText);
				
				var tot = qty * price;
				ele.parentElement.parentElement.querySelector(".row_total").innerText = tot;
				getTotal();
			}
			function addRow(ele,e){
				e.preventDefault();
				let pname = ele.parentElement.parentElement.querySelector(".card-title").innerText;
				let quantity = ele.parentElement.parentElement.querySelector(".quantity").innerText;
				let price = ele.parentElement.querySelector(".price").innerText;
				let total = price;
				
				let rows = document.querySelector(".tbody").querySelectorAll("tr");
				
				var addedStatus=false;
				
				for(i=0;i<rows.length;i++){
					var tds = rows[i].querySelectorAll("td");
					if(tds[0].innerText == pname){
						addedStatus=true;
						var qty = Number(rows[i].querySelector(".qty").value)+1;
						rows[i].querySelector(".qty").value = qty;
						var pr = Number(tds[2].innerText);
						var tot = qty * pr;
						tds[3].innerText = tot;
					}
				}
				
				if(addedStatus == false)
				{
					let trow = document.createElement("tr");
					trow.innerHTML = "<td>"+pname+"</td> <td><input type='number' class='qty' value='1' min='1' step='1'style='width:50px;' onchange='rowTotalCalc(this)' ></td> <td class='rprice'>"+price+"</td> <td class='row_total'>"+total+"</td> <td class='hide'><a href='#' class='btn btn-primary btn-sm' onclick='removeRow(this)'>Remove</a></td>";
					document.querySelector(".tbody").appendChild(trow);
					
					let q = 1;
					let p = Number(price.value);
					let t = q * p;
				}
				getTotal();
			}
			function removeRow(ele){
				alert("Are you sure romeve this?")
				ele.parentElement.parentElement.remove();
				getTotal();
				
			}
			function getTotal(){
				let sum = 0;
				let total = document.getElementsByClassName("row_total");
				let tot = total.length;
				for(i=0;i<tot;i++){
					sum = sum + Number(total[i].innerText);
					
				}
				
				gst = sum * 0.18;
				var a=Math.round(gst*100)/100;
				net = sum + a;
				document.getElementById("tot").innerText = sum;
				document.getElementById("gst").innerText = a;
				document.getElementById("net").innerText = net;
			}
			
			
			var a =[
				["apple.jpg","Apple","1kg",200],
				["orange.jpg","Orange","2kg",300],
				["mango.jpg","Mango","1kg",200],
				["guava.jpg","Guava","3kg",400],
				["pineapple.jpg","PineApple","2kg",400],
				["pomegranet.jpg","pomegranet","1kg",200]
			];
			var table="";
			
			a.forEach(function(v,i){
				table+="<div class='col-md-3 mb-5 products'>"
						+"<div class='card'>"
							+"<div style='height:180px;' class='d-flex justify-content-center align-items-center'>"
								+"<img src="+v[0]+" style='width:120px;'>"
							+"</div>"
							+"<div class='card-body'>"
								+"<h5 class='card-title'>"+v[1]+"</h5>"
								+"<h6 class='quantity'>"+v[2]+"</h6>"
								+"<p class='d-flex justify-content-between'> <span>Rs <span class='price'>"+v[3]+"</span></span><a href='#' class='btn btn-primary btn-sm' onclick='addRow(this,event)'>Add</a></p>"
								
							+"</div>"
						+"</div>"
					+"</div>";
					
			});
			document.getElementById('out').innerHTML=table;
			
			
			
			
		</script>
	</body>
</html>
