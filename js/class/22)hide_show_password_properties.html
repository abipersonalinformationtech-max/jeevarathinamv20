<html>
    <head>
        <title>Hide Show Password</title>
    </head>
    <body>
        <div>
            <input type="password" id="pwd" placeholder="Enter Your Password">
            <input type="checkbox" id="btn" onchange="hide_show_password(this)">
        </div>
        <script>
            function hide_show_password(ele){
                const status = ele.checked;
                
                if(status){
                    pwd.type = "text";
                }else{
                    pwd.type = "password";
                }
            }
        </script>
    </body>
</html>
