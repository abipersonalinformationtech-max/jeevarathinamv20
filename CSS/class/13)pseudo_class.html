<html>
	<head>
		<title>Pseudo Class</title>
		<meta name='viewport' content='width=device-width, initial-scale=1.0'>
		<style>
			/* hover, active, focus, first-child, nth-child */
			#input{
				background:red;
				border:none;
				outline:none;
				padding:3px;
			}
			#input:hover{
				background:blue;
				color:white;
			}
			p{
				color:green;
			}
			p:hover{
				color:red;
				background:yellow;
				width:130px;
			}
			span:hover{
				color:blue;
			}
			
			a:hover{
				color:green;
			}
			a:active{
				color:yellow;
			}
			li:first-child{
				color:red;
			}
			.color{
				color:purple;
			}
			td:first-child{
				color:red;
				/*font-size:50px;*/
			}
			tr:nth-child(odd){
				background:yellow;
			}
			input:focus{
				border:2px solid blue;
				border-radius:5px;
				outline:none;
			}
			@media (max-width:600px){
				a{
					font-size:50px;
				}
			}
		</style>
	</head>
	<body>
		<input type='submit' id='input' value='Click me'>
		<p>sdsdasdasfds<span>dddddd</span></p>
		<a href='google_font.html'>Click Me</a>
		
		<ul>
			<li>Apple</li>
			<li class='color'>Orange</li>
			<li class='color'>Mango</li>
		</ul>
		
		
		<table border='2' cellpadding='10' cellspacing='5'>
			<tbody>
				<tr>
					<td>Ram</td>
					<td>10</td>
				</tr>
				<tr>
					<td>Ram</td>
					<td>10</td>
				</tr><tr>
					<td>Ram</td>
					<td>10</td>
				</tr>
				<tr>
					<td>Ram</td>
					<td>10</td>
				</tr>
			</tbody>
		</table>
		
		<input type='text' placeholder='Enter Your Name'>
		
	</body>
</html>
