<html>
	<head>
		<title>A4 Size Page</title>
		<style>
			/* 
				A4 Page size is ( 210 mm X 297 mm ) or ( 21cm X 29.7cm ).
				for a4 size to use only mm or cm 
			*/
			body{
			  width: 230mm;
			  height: 100%;
			  margin: 0 auto;
			  padding: 0;
			  font-size: 12pt;
			  background: rgb(204,204,204); 
			}
			*{
			  box-sizing: border-box;
			}
			.main{
			  width: 210mm;
			  min-height: 297mm;
			  margin: 10mm auto;
			  background: white;
			  box-shadow: 0 0 0.5cm rgba(0,0,0,0.5);
			}
			.page {
			  padding: 1cm;
			  height: 297mm;
			}
			@page {
			  size: A4;
			  margin: 0;
			}
			@media print {
			  html, body {
				width: 210mm;
				height: 297mm;        
			  }
			  .main {
				margin: 0;
				border: initial;
				border-radius: initial;
				width: initial;
				min-height: initial;
				box-shadow: initial;
				background: initial;
				page-break-after: always;
			  }
			}
		</style>
	</head>
	<body>
		<div class="main">
		  <div class="page">
			<h3 align='center'>Welcome</h3>
			<h3 align='center'>Welcome</h3>
			<h3 align='center'>Welcome</h3>
			<h3 align='center'>Welcome</h3>
			<h3 align='center'>Welcome</h3>
			<h3 align='center'>Welcome</h3>
		  </div>    
		</div>
	</body>
</html>
