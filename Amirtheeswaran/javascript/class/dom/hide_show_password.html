<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hide and Show Password</title>
</head>
<body>
    <p><input type="password" id="pwd"></p>
    <label><input type="checkbox" id="chk"><span>Show Password</span></label>
    <script>
        let check_box =  document.querySelector("#chk");
        let pwd = document.querySelector("#pwd");
        check_box.onchange = function(e){
            if(pwd.type == "password"){
                pwd.type = "text";
                check_box.parentElement.querySelector("span").innerHTML = "Hide Password";
            }else{
                pwd.type = "password";
                check_box.parentElement.querySelector("span").innerHTML = "Show Password";
            }
        }
    </script>
</body>
</html>
