<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" ></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"></script>
    <title>Document</title>
</head>
<body>
    {% include 'navbar.html' %}
    <div class="container">
        <div class="row">
            <div class="col-md-6 mx-auto mt-5 border p-3">
                {% include 'flash.html' %}
                <form action="" method="POST">
                    <div>
                        <label for="">Name</label>
                        <input type="text" name="uname" class="form-control" value="{{info.uname}}" required>
                    </div>
                    <div>
                        <label for="">Email</label>
                        <input type="email" name="uemail" class="form-control" value="{{info.uemail}}" required>
                    </div>
                    <div>
                        <label for="">Mobile</label>
                        <input type="text" name="umobile" class="form-control" value="{{info.umobile}}" required>
                    </div>
                    <div>
                        <label for="">Password</label>
                        <input type="password" name="upassword" class="form-control" value="{{info.upassword
                        }}" required>
                    </div>
                    <input type="submit" value="Save" class="btn btn-success mt-2 w-100">
                </form>
            </div>
        </div>
    </div>
</body>
</html>
