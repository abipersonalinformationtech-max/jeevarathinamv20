<html>
	<head>
		<title>add_remove</title>
		<style>
			.menu{
				padding:10px;
				width:100px;
				border:1px solid grey;
				margin-top:10px;
			}
			a{
				display:block;
				margin-bottom:2px;
			}
			.hide{
				display:none;
			}
		</style>
	</head>
	<body>
		<input type='button' value='Show' onclick='menu(this)'>
		<div class='menu hide'>
			<a href=''>Home</a><br>
			<a href=''>Shop</a><br>
			<a href=''>About Us</a><br>
			<a href=''>Contact Us</a>
		</div>
		<script>
			function menu(ele){
				var cls = document.querySelector(".menu");
				if(cls.classList.contains("hide")){
					cls.classList.remove("hide");
					ele.value="Hide";
				}else{
					cls.classList.add("hide");
					ele.value="Show";
				}
			}
		</script>
	</body>
</html>
