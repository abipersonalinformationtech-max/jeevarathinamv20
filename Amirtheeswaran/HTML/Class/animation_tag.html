<html>
	<head>
		<title>marquee</title>
	</head>
	<body>
		<!-- Right to left N times -->
		<marquee>Welcome to VR SOFT TECH</marquee>
		<marquee><img src="../img/1.jpg" height="100px" width="100px"></marquee>
		
		<!-- scroll- Right to left -->
		<marquee behavior="scroll">Welcome to VR SOFT TECH</marquee>
		
		<!-- slide- one time Right to left -->
		<marquee behavior="slide">Welcome to VR SOFT TECH</marquee>
		
		<!-- alternate- Right to left then left to right N times-->
		<marquee behavior="alternate">Welcome to VR SOFT TECH</marquee>
		
		<!-- scrollamount increase speed-->
		<marquee scrollamount="100" behavior="alternate">Welcome to VR SOFT TECH</marquee>
		
		<!-- loop -->
		<marquee scrollamount="100" behavior="alternate" loop="6">Welcome to VR SOFT TECH</marquee>
		
		
		<!-- direction - left / right / up / down -->
		<marquee direction="down">
			<img src="../img/1.jpg" height="100px" width="100px">
		</marquee>
	</body> 
</html>
