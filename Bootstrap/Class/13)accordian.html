<html>
	<head>
		<title>Accordian</title>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
		<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
	</head>
	<body>
		<div class='container'>
			<div class='row'>
				<div class='col-md-12'>
					<div class="accordion" id="accordionExample">
						<div class="card">
							<div class="card-header" id="headingOne">
							  <h2 class="mb-0">
								<button class="btn btn-link btn-block text-left" type="button" data-toggle="collapse" data-target="#collapseOne">
								  What is HTML
								</button>
							  </h2>
							</div>
							<div id="collapseOne" class="collapse show"  data-parent="#accordionExample">
							  <div class="card-body">
								Some placeholder content for the first accordion panel. This panel is shown by default, thanks to the class.
							  </div> 
							</div>
						</div>
						
						<div class="card">
							<div class="card-header" id="headingOne">
							  <h2 class="mb-0">
								<button class="btn btn-link btn-block text-left collapsed" type="button" data-toggle="collapse" data-target="#collapseOne">
								  What is HTML
								</button>
							  </h2>
							</div>
							<div id="collapseOne" class="collapse"  data-parent="#accordionExample">
							  <div class="card-body">
								Some placeholder content for the first accordion panel. This panel is shown by default, thanks to the class.
							  </div> 
							</div>
						</div>
						
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
