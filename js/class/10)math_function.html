<script>
	console.log(Math.abs(-5)); //5
	console.log(Math.min(10,8,12)); //8
	console.log(Math.max(10,8,12)); //12
	console.log(Math.ceil(4.05)); //5
	console.log(Math.floor(4.8)); //4
	console.log(Math.round(5.8)); //6
	console.log(Math.PI);
	console.log(Math.random()); //Display random numbers
</script>
