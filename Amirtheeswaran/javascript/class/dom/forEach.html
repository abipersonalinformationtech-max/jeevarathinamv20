<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" class="num">
    <input type="text" class="num">
    <input type="text" class="num">
    <input type="text" class="num">
    <input type="text" class="num">
    <input type="button" value="Get Total" onclick="get_total()">
    <h1 id="output"></h1>
    <script>
        
        function get_total(){
            let a = document.querySelectorAll(".num");
            let sum = 0;

            a.forEach(function(ele){
                sum += Number(ele.value);
            });

            document.querySelector("#output").innerHTML = "Total is " + sum;
        }
        
          
    </script>
</body>
</html>
