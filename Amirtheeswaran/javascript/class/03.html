<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>array</title>
</head>
<body>
    <script>
        let a = [35,34,85,98,17];
        
        let pass = 0;
        let fail = 0;

        for(i=0;i<a.length;i++){
            if(a[i]>=35){
                pass++;
            }else{
                fail++;
            }
        }

        console.log("No of Pass : "+pass);
        console.log("No of Fail : "+fail);
    </script>
</body>
</html>
