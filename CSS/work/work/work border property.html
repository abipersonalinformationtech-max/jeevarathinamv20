<html>
	<head>
		<title>boxes</title>	
		<style>
			.box1{
				border:10px solid red;
				height:100px;
				width:100px;
			}
			.box2{
				border:10px groove green;
				height:100px;
				width:100px;
			}
			.box3{
				border:10px ridge blue;
				height:100px;
				width:100px;
			}
			.box4{
				border:10px inset yellow;
				height:100px;
				width:100px;
			}
			.box5{
				border:10px outset orange;
				height:100px;
				width:100px;
			}
			.box6{
				border:10px dotted pink;
				height:100px;
				width:100px;
			}
			.box7{
				border:10px dashed purple;
				height:100px;
				width:100px;
			}
			.box8{
				border:10px double black;
				height:100px;
				width:100px;
			}
			.a1{
				border:10px solid red;
				border-radius:20px;
				height:100px;
				width:100px;
			}
			.a2{
				border:10px groove green;
				border-radius:100%;
				height:100px;
				width:100px;
			}
			.a3{
				border:10px ridge blue;
				border-top-right-radius:20px;
				border-bottom-left-radius:20px;
				height:100px;
				width:100px;
			}
			.a4{
				border:10px inset yellow;
				border-top-left-radius:20px;
				border-bottom-right-radius:20px;
				height:100px;
				width:100px;
			}
			.a5{
				border:10px outset orange;
				border-top-left-radius:45px;
				border-bottom-right-radius:45px;
				height:100px;
				width:100px;
			}
			.a6{
				border:10px dotted pink;
				border-top-right-radius:45px;
				border-bottom-left-radius:45px;
				height:100px;
				width:100px;
			}
			.a7{
				border:10px dashed purple;	
				border-radius:40%;
				height:100px;
				width:100px;
			}
			.a8{
				border:10px double black;
				border-radius:100%;
				height:100px;
				width:100px;
			}
			
			.aa1{
				border:10px solid;
				border-color:red green blue yellow;	
				height:100px;
				width:100px;
			}
			.aa2{
				border:solid black;
				border-width:40px 30px 20px 10px;
				height:100px;
				width:100px;
			}
			
		</style>
	</head>
	<body>
		<table>
			<tr>
				<td>
					<div class="box1"></div>
				 </td>
				 <td>
					<div class="box2"></div>
				 </td>
				 <td>
					<div class="box3"></div>
				 </td>
				 <td>
					<div class="box4"></div>
				 </td>
				 <td>
					<div class="box5"></div>
				 </td>
				 <td>
					<div class="box6"></div>
				 </td>
				 <td>
					<div class="box7"></div>
				 </td>
				 <td>
					<div class="box8"></div>
				 </td>
			 </tr>
			 
			 <tr>
				<td>
					<div class="a1"></div>
				 </td>
				 <td>
					<div class="a2"></div>
				 </td>
				 <td>
					<div class="a3"></div>
				 </td>
				 <td>
					<div class="a4"></div>
				 </td>
				 <td>
					<div class="a5"></div>
				 </td>
				 <td>
					<div class="a6"></div>
				 </td>
				 <td>
					<div class="a7"></div>
				 </td>
				 <td>
					<div class="a8"></div>
				 </td>
			 </tr>
			 
			 <tr>
				<td>
					<div class="aa1"></div>
				 </td>
				 <td>
					<div class="aa2"></div>
				 </td>
			</tr>	 
		</table>
	</body>
</html>
