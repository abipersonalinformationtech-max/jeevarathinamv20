<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <div class="fs-1">
                    <p>Student Mark Sheet</p>
                </div>

                <form>
                    <div class="mb-3">
                        <label class="form-label">Tamil</label>
                        <input type="number" class="form-control" id="tamil">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">English</label>
                        <input type="number" class="form-control" id="english">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Maths</label>
                        <input type="number" class="form-control" id="maths">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Science</label>
                        <input type="number" class="form-control" id="science">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Social</label>
                        <input type="number" class="form-control" id="social">
                    </div>

                    <button type="button" class="btn btn-danger" onclick="get_total()">Submit</button>
                </form>
                <p id="output"></p>
                <p id="average"></p>
            </div>
        </div>
    </div>
    <script>
        function get_total(){
            let tamil = Number(document.getElementById("tamil").value);
            let english = Number(document.getElementById("english").value);
            let maths = Number(document.getElementById("maths").value);
            let science = Number(document.getElementById("science").value);
            let social = Number(document.getElementById("social").value);

            let total = tamil + english + maths + science + social;
            let average = total / 5;

            document.getElementById("output").innerHTML = "Total is "+total;
            document.getElementById("average").innerHTML = "Average is "+average;

        }
    </script>
</body>

</html>
