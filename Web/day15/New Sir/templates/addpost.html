{% extends 'layout.html' %}
{% block body %}
<div class='col-md-6 border p-3 mx-auto mt-5'>
<h3 class='text-center'>Add Post</h3>
	<form method='post' enctype="multipart/form-data">
		<div>
			<label>Title</label>
			<input type='text' class='form-control' name='ptitle'>
		</div>
		<div>
			<label>Description</label>
			<textarea class='form-control' name='pdes'></textarea>
		</div>
		<div>
			<label>Image</label>
			<input type='file' class='form-control' name='pimage'>
		</div>
		<input type='submit' value='Register' class='mt-3 btn btn-primary w-100'>
	</form>
</div>
{% endblock %}
