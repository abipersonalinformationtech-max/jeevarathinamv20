<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p><input type="password" id="psd"></p>
    <label><input type="checkbox" id="chk"><span id="span">show password</span></label>

    <script>
        let password = document.querySelector("#psd");
        let checkbox = document.querySelector("#chk");

        checkbox.onchange = function(){
            if(password.type == "password"){
                password.type = "text";
                checkbox.parentElement.querySelector("#span").innerHTML = "hide password";

            }else{
                password.type = "password";
                checkbox.parentElement.querySelector("#span").innerHTML = "show password";
            }
        }
    </script>
</body>
</html>
