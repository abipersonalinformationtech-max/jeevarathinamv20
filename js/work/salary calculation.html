<html>
	<head>
		<title>salary calculation</title>
	</head>
	<body>
		<script>
			var salary = Number(prompt("Enter salary :"));
			var allowence = Number(prompt("Enter allowence :"));
			var detection = Number(prompt("Enter detection :"));
			var total = salary-allowence+detection;
			console.log("Total : "+total);
		</script>
	</body>
</html>
